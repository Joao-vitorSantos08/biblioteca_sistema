<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aviso do Sistema | Biblioteca</title>
    <!-- Link para o seu CSS local -->
    <link rel="stylesheet" th:href="@{/style/erro.css}">
</head>
<body>

    <div class="main-container">
        
        <!-- Cabeçalho de Status -->
        <header class="error-header">
            <span class="admin-badge">Status do Sistema</span>
            <!-- Se for um 404 ou erro geral, o título muda automaticamente -->
            <h1 class="livro-titulo" th:text="${mensagem ?: 'Atenção'}">Aviso</h1>
        </header>

        <!-- CARD ÚNICO DE ERRO: Só aparece se houver alguma mensagem -->
        <div class="error-card" th:if="${entidadeOrfa != null or registroDuplicado != null or personalizacao != null}">
            
            <div class="card-content">
                <!-- Título do Erro (Prioriza Entidade Orfã, depois Duplicado) -->
                <h2 th:text="${entidadeOrfa ?: registroDuplicado ?: 'Erro de Validação'}"></h2>
                
                <!-- Descrição Adicional (Se existir) -->
                <p th:if="${personalizacao != null}" th:text="${personalizacao}"></p>
            </div>

        </div>

        <!-- Navegação de Retorno -->
        <footer class="error-footer">
            <a th:href="@{/home}" class="btn-voltar">← Voltar para a Página Inicial</a>
        </footer>

    </div>

</body>
</html>
